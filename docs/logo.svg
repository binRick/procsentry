<svg width="820" height="210" viewBox="0 0 820 210" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#190b20"/>
      <stop offset="0.55" stop-color="#241030"/>
      <stop offset="1" stop-color="#3a1640"/>
    </linearGradient>
    <radialGradient id="scope" cx="0.42" cy="0.40" r="0.65">
      <stop offset="0" stop-color="#33184a"/>
      <stop offset="1" stop-color="#140818"/>
    </radialGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="-0.4">
      <stop offset="0" stop-color="#ffb03b" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#ffb03b" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffd089"/>
      <stop offset="1" stop-color="#ff8f33"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="816" height="206" rx="22" fill="url(#bg)" stroke="#4a2150" stroke-width="2"/>

  <!-- radar scope watching a process tree -->
  <g transform="translate(118,105)">
    <circle r="74" fill="url(#scope)" stroke="#5a2c64" stroke-width="2"/>
    <circle r="52" fill="none" stroke="#58c8a0" stroke-width="1.1" stroke-opacity="0.30"/>
    <circle r="30" fill="none" stroke="#58c8a0" stroke-width="1.1" stroke-opacity="0.30"/>
    <line x1="-74" y1="0" x2="74" y2="0" stroke="#58c8a0" stroke-width="1" stroke-opacity="0.15"/>
    <line x1="0" y1="-74" x2="0" y2="74" stroke="#58c8a0" stroke-width="1" stroke-opacity="0.15"/>
    <!-- sweeping beam -->
    <path d="M0 0 L74 -7 L60 -45 Z" fill="url(#beam)"/>
    <line x1="0" y1="0" x2="73" y2="-7" stroke="#ffc863" stroke-width="2.2" stroke-opacity="0.95"/>
    <!-- process tree of blips -->
    <g stroke="#6fe0a0" stroke-width="1.5" stroke-opacity="0.75" fill="none">
      <path d="M-6 -4 V 34 M-6 12 H 20 M-6 34 H 20 M20 12 V 12 M20 34 H 38"/>
    </g>
    <circle cx="38" cy="-40" r="3.5" fill="#f472b6"/>
    <circle cx="-40" cy="-26" r="4" fill="#88aaff"/>
    <circle cx="20" cy="12" r="4.5" fill="#6fe0a0"/>
    <circle cx="20" cy="34" r="4.5" fill="#6fe0a0"/>
    <circle cx="38" cy="34" r="3.5" fill="#6fe0a0"/>
    <circle cx="-6" cy="-4" r="7" fill="#ffb03b"/>
    <circle cx="-6" cy="-4" r="12" fill="none" stroke="#ffb03b" stroke-width="1.5" stroke-opacity="0.55"/>
  </g>

  <!-- wordmark -->
  <text x="232" y="98" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace"
        font-size="58" font-weight="800" letter-spacing="-1.5">
    <tspan fill="#ece0f3">proc</tspan><tspan fill="url(#word)">sentry</tspan>
  </text>
  <text x="235" y="136" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
        font-size="20.5" fill="#bba6c9">pick processes &#183; watch every program they <tspan fill="#ffb03b" font-style="italic">exec()</tspan></text>
  <text x="235" y="170" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="16" fill="#7a6488">
    <tspan fill="#ffb03b">&#9660;</tspan> sshd  <tspan fill="#6f5a7d">&#9500;&#9472;</tspan> session  <tspan fill="#6f5a7d">&#9500;&#9472;</tspan> bash  <tspan fill="#6f5a7d">&#9492;&#9472;</tspan> &#8230;
  </text>
</svg>
